<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>REAL-TICKET</title>
</head>
<body>
<script>
// 你的 API 代码写在 script 标签里就可以运行了
// API 封装示例
const API_BASE = 'http://你的服务器IP:3000/api/';

// 1. 发送验证码
async function sendCode(phone) {
    const res = await fetch(`${API_BASE}sendCode`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ phone })
    });
    return res.json();
}

// 2. 登录
async function login(phone, code) {
    const res = await fetch(`${API_BASE}login`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ phone, code })
    });
    return res.json();
}

// 3. 查询剩余名额
async function getRemain() {
    const res = await fetch(`${API_BASE}remain`);
    return res.json();
}

// 4. 抢票（核心）
async function bookTicket(userId, ticketId) {
    const res = await fetch(`${API_BASE}bookTicket`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ userId, ticketId })
    });
    return res.json();
}

// 5. 我的订单
async function getMyOrders(userId) {
    const res = await fetch(`${API_BASE}getMyOrders?userId=${userId}`);
    return res.json();
}
</script>
</body>
</html>
